{%block css_adicional%}
<link rel="stylesheet" href="../static/src/css/cadastro.css">
{%endblock%}

{% extends "layout.html" %}
{% block conteudo %}
<div class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="vexx-card">
        <div class="vexx-mini-header">
            <img src="../static/src/img/logo-sem-fundo-branca.png" alt="Vexx Logo" class="vexx-logo">
            <span class="text-white fw-bold text-uppercase"
                style="font-size: 1.6rem; letter-spacing: 1px; font-family: 'Urbanist', sans-serif;">
                Vexx <span style="color: #CCFF00;">Sneakers</span>
            </span>
        </div>

        <div class="p-4 p-sm-5">
            <form>
                <div class="mb-2">
                    <label class="vexx-label">Usuário</label>
                    <input type="text" class="form-control vexx-input" placeholder="Digite seu usuário" id="usuario">
                </div>

                <div class="mb-3">
                    <label class="vexx-label">E-mail</label>
                    <input type="email" class="form-control vexx-input" placeholder="seu@email.com" id="email">
                </div>

                <div class="mb-4">
                    <label class="vexx-label">Senha</label>
                    <input type="password" class="form-control vexx-input" placeholder="••••••••" >
                </div>

                <button type="submit" class="btn vexx-btn w-100 text-uppercase">Entrar</button>
            </form>

            <div class="text-center mt-4">
                <p class="small text-muted mb-0">Não tem conta? <a href="/cadastro"
                        class="text-dark fw-bold text-decoration-none">Cadastre-se</a></p>
            </div>
        </div>
    </div>
</div>



{% endblock %}
