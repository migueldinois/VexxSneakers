{%block css_adicional%}
<link rel="stylesheet" href="../static/src/css/pagina_inicial.css">
{%endblock%}

{% extends "layout.html" %}
{% block conteudo %}

<!-- Banners Página Inicial -->
<div id="carouselExample" class="carousel slide">
    <div class="carousel-inner">
        <div class="carousel-item active">
            <img src="/static/src/img/home_banners/banner_home_1.png" class="d-block vw-100 vh-100 object-fit-cover"
                alt="Imagem Banner Vexx 1">
        </div>
        <div class="carousel-item">
            <img src="/static/src/img/home_banners/banner_home_2.png" class="d-block vw-100 vh-100 object-fit-cover"
                alt="Imagem Banner Vexx 2">
        </div>
        <div class="carousel-item">
            <img src="/static/src/img/home_banners/banner_home_3.png" class="d-block vw-100 vh-100 object-fit-cover"
                alt="Imagem Banner Vexx 3">
        </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
    </button>
</div>

<!-- Catalogo Itens -->
<div class="bg-dark min-vh-100 w-100 py-5" id="catalogo">

    <div class="container">
        <h2 class="text-center text-white mb-5">CATALOGO</h2>

        <div class="row g-4 mb-4">
            {% for produto in produtos %}
            <div class="col-12 col-md-4">
                <div class="bg-secondary bg-opacity-25 p-3 rounded text-white text-center">
                    <a class="card_produto" href="/produto/{{produto.codigo}}">
                        <img src="{{produto.banner}}" class="img-fluid rounded object-fit-cover w-100"
                            style="height: 220px;" alt="{{produto.nome}}">
                    </a>
                    <p class="mt-3 mb-0 fs-6 text-light opacity-75">{{produto.nome}}</p>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

<!-- Categoria -->
<div class="container-fluid p-0 min-vh-100 d-flex flex-column w-100 vw-100 overflow-x-hidden" id="Categorias">
    <div class="row g-0 w-100 m-0 p-0">
        {% for categoria in categorias %}
        <div
            class="col-12 col-md-6 d-flex flex-column justify-content-center position-relative overflow-hidden style-categoria p-0">

            <img src="{{categoria.imagem}}" alt="Banner {{categoria.nome}}"
                class="position-absolute top-0 start-0 w-100 h-100 img-fundo">

            <div class="position-absolute top-0 start-0 w-100 h-100 bg-dark bg-opacity-25" style="z-index: 2;"></div>

            <div class="position-relative text-white ps-5" style="z-index: 3;">
                <h2 class="fs-1 fw-bold mb-3">{{categoria.nome}}</h2>
                <a href="{{ url_for('categoria_unica', id_categoria=categoria.codigo) }}"
                    class="btn btn-light rounded-pill px-4 py-2 fw-semibold text-dark shadow-sm">Acessar -></a>
            </div>

        </div>
        {% endfor %}
    </div>
</div>


{% endblock %}
