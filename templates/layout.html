<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vexx Sneakers</title>
    <!-- Bootstrap  -->
    <link rel="stylesheet" href="../static/src/css/layout.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- CSS -->

    {% block css_adicional %}{% endblock %}
</head>

<body>
    <!-- HEADER -->

    <header>
        <nav class=" navbar__header navbar navbar-expand-lg container">
            <div class="container-fluid d-flex align-items-center justify-content-between">
                <img class="logo__header" src="https://picsum.photos/200" alt="Logo">
                <div class="d-flex align-items-center order-lg-last gap-2">
                    <button  type="button" class="btn rounded-circle p-2" aria-label="Ícone">
                        <img class="icon__header" src="../static/src/img/cart.svg" alt="Icone Carrinho">
                    </button>
                    <button type="button"  class="btn rounded-circle p-2" aria-label="Ícone">
                        <img class="icon__header" src="../static/src/img/profile.svg" alt="Icone Perfil">
                    </button>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                        aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                </div>
                <div class="items__menu collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav mb-lg-0">
                        <li class="nav-item"><a class="nav-link text-white" href="#carouselExample">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link text-white" href="#Categorias">Categorias</a></li>
                        <li class="nav-item"><a class="nav-link text-white" href="#catalogo">Catalogo</a></li>
                        <li class="nav-item"><a class="nav-link text-white" href="#lancamento">Lançamentos</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>


    <!-- CONTEÚDO -->
    {% block conteudo %}
    {% endblock %}

    <!-- FOOTER -->

    <footer class="bg-black text-white py-4">
        <div class="container d-flex justify-content-between align-items-center">
            <div>
                <p>Vexx Sneakers</p>
                <a href="#" class="text-white d-block">Politica de Privacidade</a>
                <a href="#" class="text-white d-block">Termos de uso</a>
            </div>
            <img class="logo_footer" src="../static/src/img/logo-sem-fundo-branca.png" alt="Logo">
            <div class="d-flex gap-3">
                <img src="../static/src/img/Instagram.svg" alt="Instagram" width="24">
                <img src="../static/src/img/X.svg" alt="X" width="24">
                <img src="../static/src/img/Facebook.svg" alt="Facebook" width="24">
            </div>
        </div>
    </footer>





</body>

</html>
