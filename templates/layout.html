<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vexx Sneakers</title>
    <link rel="stylesheet" href="../static/src/css/layout.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <style>
        .cart-offcanvas {
            background-color: #a6a6a6 !important;
            color: #000000;
            border-left: none;
            width: 380px !important;
        }
        
        .cart-header-title {
            font-family: 'Impact', 'Arial Black', sans-serif;
            text-transform: uppercase;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        .cart-items {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        .cart-item-card {
            background-color: #d9d9d9;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .cart-item-img-container {
            background-color: #ececec;
            width: 95px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            font-size: 0.8rem;
            color: #555555;
            text-transform: uppercase;
        }
        
        .cart-item-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cart-item-body {
            padding: 10px 12px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .cart-item-name {
            font-size: 0.95rem;
            font-weight: 600;
            margin: 0 0 2px 0;
            line-height: 1.2;
        }

        .cart-item-price {
            font-size: 0.9rem;
            font-weight: 500;
            margin: 0 0 6px 0;
        }

        .quantity-control {
            display: inline-flex;
            align-items: center;
            background-color: #ffffff;
            border-radius: 6px;
            padding: 2px;
            max-width: 90px;
        }

        .quantity-btn {
            background: none;
            border: none;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
            color: #000000;
            cursor: pointer;
        }

        .quantity-value {
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0 6px;
            min-width: 20px;
            text-align: center;
        }

        .cart-btn-delete {
            background: none;
            border: none;
            padding: 0 15px;
            color: #000000;
            transition: color 0.2s, transform 0.1s;
        }
        
        .cart-btn-delete:hover {
            color: #dc3545;
            transform: scale(1.05);
        }

        .cart-summary-footer {
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 0, 0, 0.15);
        }

        .cart-total-label {
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 1.05rem;
            text-transform: uppercase;
        }

        .btn-checkout-vexx {
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #000000;
            border-radius: 8px;
            padding: 14px;
            font-weight: bold;
            text-transform: uppercase;
            width: 100%;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }
        
        .btn-checkout-vexx:hover {
            background-color: #222222;
            border-color: #222222;
            color: #ffffff;
        }
    </style>

    {% block css_adicional %}{% endblock %}
</head>

<body>

    <header>
        <nav class="navbar__header navbar navbar-expand-lg container">
            <div class="container-fluid d-flex align-items-center justify-content-between">
                <img class="logo__header" src="../static/src/img/logo-sem-fundo-branca.png" alt="Logo">
                <div class="d-flex align-items-center order-lg-last gap-2">
                    
                    <button type="button" class="btn rounded-circle p-2" aria-label="Ícone Carrinho" data-bs-toggle="offcanvas" data-bs-target="#carrinhoVexx" aria-controls="carrinhoVexx">
                        <img class="icon__header" src="../static/src/img/cart.svg" alt="Icone Carrinho">
                    </button>
                    
                    <button type="button" class="btn rounded-circle p-2" aria-label="Ícone Perfil">
                        <a href="/login">
                            <img class="icon__header" src="../static/src/img/profile.svg" alt="Icone Perfil">
                        </a>
                    </button>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                        aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                </div>
                <div class="items__menu collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav mb-lg-0">
                        <li class="nav-item"><a class="nav-link text-white" href="/#carouselExample">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link text-white" href="/#Categorias">Categorias</a></li>
                        <li class="nav-item"><a class="nav-link text-white" href="/#catalogo">Catalogo</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <div class="offcanvas offcanvas-end cart-offcanvas" tabindex="-1" id="carrinhoVexx" aria-labelledby="carrinhoVexxLabel">
        <div class="offcanvas-header border-bottom border-dark py-3">
            <h5 class="offcanvas-title cart-header-title" id="carrinhoVexxLabel">Seu Carrinho</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        
        <div class="offcanvas-body d-flex flex-column justify-content-between">
            <div class="cart-items" id="cart-items">
                


            </div>

            <div class="cart-summary-footer">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="cart-total-label">Total da compra:</span>
                    <span class="cart-total-label">R$2999,99</span>
                </div>
                <button type="button" class="btn-checkout-vexx">Finalizar Carrinho</button>
            </div>
        </div>
    </div>

    {% block conteudo %}
    {% endblock %}

    <footer class="bg-black text-white py-4">
        <div class="container d-flex justify-content-between align-items-center">
            <div>
                <p>Vexx Sneakers</p>
                <a href="/politica_privacidade" class="text-white d-block">Politica de Privacidade</a>
                <a href="/termos_uso" class="text-white d-block">Termos de uso</a>
            </div>
            <img class="logo_footer" src="../static/src/img/logo-sem-fundo-branca.png" alt="Logo">
            <div class="d-flex gap-3">
                <a href="https://instagram.com/vexxsneakers" target="_blank" rel="noopener noreferrer">
                    <img src="../static/src/img/Instagram.svg" alt="Instagram" width="24">
                </a>
                <a href="https://x.com/vexxsneakers" target="_blank" rel="noopener noreferrer">
                    <img src="../static/src/img/X.svg" alt="X" width="24">
                </a>
                <a href="https://facebook.com/vexxsneakers" target="_blank" rel="noopener noreferrer">
                    <img src="../static/src/img/Facebook.svg" alt="Facebook" width="24">
                </a>
            </div>
        </div>
    </footer>
    <script src="../static/src/js/carrinho.js"></script>

</body>

</html>
