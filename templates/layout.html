<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vexx Sneakers</title>
    <link rel="stylesheet" href="../static/src/css/layout.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    {% block css_adicional %}{% endblock %}
</head>

<body>

    <header>
        <nav class="navbar__header navbar navbar-expand-lg container">
            <div class="container-fluid d-flex align-items-center justify-content-between">
                <a href="/">
                    <img class="logo__header" src="../static/src/img/logo-sem-fundo-branca.png" alt="Logo">
                </a>
                <div class="d-flex align-items-center order-lg-last gap-2">
                    
                    <button type="button" class="btn rounded-circle p-2" aria-label="Ícone Carrinho" data-bs-toggle="offcanvas" data-bs-target="#carrinhoVexx" aria-controls="carrinhoVexx">
                        <img class="icon__header" src="../static/src/img/cart.svg" alt="Icone Carrinho">
                    </button>
                    
                    <button type="button" class="btn rounded-circle p-2" aria-label="Ícone Perfil">
                        <a href="/login">
                            <img class="icon__header" src="../static/src/img/profile.svg" alt="Icone Perfil">
                        </a>
                    </button>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                        aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                </div>
                <div class="items__menu collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav mb-lg-0">
                        <li class="nav-item"><a class="nav-link text-white" href="/#carouselExample">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link text-white" href="/#Categorias">Categorias</a></li>
                        <li class="nav-item"><a class="nav-link text-white" href="/#catalogo">Catalogo</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <div class="offcanvas offcanvas-end bg-secondary text-dark" tabindex="-1" id="carrinhoVexx" aria-labelledby="carrinhoVexxLabel">
        <div class="offcanvas-header border-bottom border-dark py-3">
            <h5 class="offcanvas-title text-uppercase fw-bold fs-4 text-black" id="carrinhoVexxLabel">Seu Carrinho</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        
        <div class="offcanvas-body d-flex flex-column justify-content-between">
            <div class="flex-grow-1 overflow-auto pe-1" id="cart-items">
                
            </div>

            <div class="mt-auto pt-3 border-top border-dark-subtle">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="fw-bold text-uppercase text-black">Total da compra:</span>
                    <span class="cart-total-price fw-bold fs-5 text-black">R$0.00</span>
                </div>
                <button type="button" class="btn btn-dark w-100 py-3 fw-bold text-uppercase rounded-3">Finalizar Carrinho</button>
            </div>
        </div>
    </div>

    {% block conteudo %}
    {% endblock %}

    <footer class="bg-black text-white py-4">
        <div class="container d-flex justify-content-between align-items-center">
            <div>
                <p class="mb-1">Vexx Sneakers</p>
                <a href="/politica_privacidade" class="text-white d-block small">Politica de Privacidade</a>
                <a href="/termos_uso" class="text-white d-block small">Termos de uso</a>
            </div>
            <img class="logo_footer" src="../static/src/img/logo-sem-fundo-branca.png" alt="Logo">
            <div class="d-flex gap-3">
                <a href="https://instagram.com/vexxsneakers" target="_blank" rel="noopener noreferrer">
                    <img src="../static/src/img/Instagram.svg" alt="Instagram" width="24">
                </a>
                <a href="https://x.com/vexxsneakers" target="_blank" rel="noopener noreferrer">
                    <img src="../static/src/img/X.svg" alt="X" width="24">
                </a>
                <a href="https://facebook.com/vexxsneakers" target="_blank" rel="noopener noreferrer">
                    <img src="../static/src/img/Facebook.svg" alt="Facebook" width="24">
                </a>
            </div>
        </div>
    </footer>
    <script src="../static/src/js/carrinho.js"></script>

</body>

</html>
